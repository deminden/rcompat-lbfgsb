name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Lints
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Tests
        run: cargo test --all-features
      - name: Docs
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --no-deps --all-features
      - name: Provenance guard
        run: scripts/check_no_forbidden_sources.sh
      - name: Package audit
        run: |
          package_files="$(mktemp)"
          cargo package --list --allow-dirty > "$package_files"
          if grep -E '^(external|data|target)/' "$package_files"; then
            echo "Ignored inspection/data/build paths must not be packaged." >&2
            exit 1
          fi
          cargo package --allow-dirty

  publish:
    name: Deploy to crates.io
    needs: rust
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    concurrency:
      group: crates-io-publish
      cancel-in-progress: false
    permissions:
      contents: read
      deployments: write
    environment:
      name: crates.io
      url: https://crates.io/crates/rcompat-lbfgsb
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Verify release tag
        run: |
          version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "$version" != "$tag_version" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match Cargo.toml version ${version}." >&2
            exit 1
          fi
      - name: Publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          : "${CARGO_REGISTRY_TOKEN:?Set the CARGO_REGISTRY_TOKEN repository secret to publish to crates.io.}"
          cargo publish --token "$CARGO_REGISTRY_TOKEN"
